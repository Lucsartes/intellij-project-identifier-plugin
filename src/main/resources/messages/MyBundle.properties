# Default (English) resource bundle for Project Identifier plugin
settings.parent.title=Project Identifier Settings
settings.child.title=Project Settings
settings.identifier.override.label=Override identifier text (optional)
settings.identifier.override.tooltip.title=Using placeholders
settings.identifier.override.tooltip.description=Leave empty to derive the identifier from the project name, or enter custom text. You can embed placeholders that are filled in automatically. Supported: ${branch} - the current Git branch (e.g. "XXX - ${branch}"). The watermark refreshes automatically when you switch branches. If the project has no Git branch (not a repository, or a detached HEAD), ${branch} becomes an empty string.
settings.font.family.label=Font family
# Annotate a value to indicate it is the default one
default.annotated.value={0} (Default)
settings.text.size.px.label=Text size (px)
settings.text.color.label=Text color
settings.preview.label=Preview
settings.preview.tooltip.title=About this preview
settings.preview.tooltip.description=Shows the identifier with the chosen font, size and color at full opacity, over the current IDE background color. On-screen opacity and position are controlled by the IDE Background Image page, so the actual watermark appears fainter and positioned per those settings.
settings.reset.label=Reset all settings to default values
settings.reset.button=Reset
settings.hint.label=To change the watermark position and opacity, go to Appearance & Behavior | Appearance | Background Image.
settings.hint.tooltip.title=Why are some settings in another menu?
settings.hint.tooltip.description=This plugin renders a transparent image with your project identifier and applies it using the IDE's Background Image feature. Image-related options like position, opacity, and scaling are controlled by that IDE menu. Other plugin-specific options are available here.

# Application-level (global) settings
settings.application.title=Project Identifier (Global)
settings.application.ignored.words.label=Ignored words (comma-separated, case-insensitive)
settings.application.ignored.words.tooltip=Words to remove from project names before generating identifiers. Matching is case-insensitive. Example: if you add "tr, tre, internal", a project named "tr-my-project" will generate identifier "MP" instead of "TMP".
settings.application.reset.label=Reset to default values
settings.application.reset.button=Reset

# Plugin metadata
plugin.name=Project Identifier
plugin.description=Adds a subtle, low-opacity text watermark to the editor background per project to help distinguish multiple open projects.
