default.annotated.value={0} (Par défaut)
settings.text.size.px.label=Taille du texte (px)
settings.text.color.label=Couleur du texte
settings.reset.label=Réinitialiser tous les réglages aux valeurs par défaut
settings.reset.button=Réinitialiser
settings.hint.label=Pour modifier la position et l'opacité du filigrane, ouvrez Apparence et comportement | Apparence | Image d'arrière-plan.
settings.hint.tooltip.title=Pourquoi certains réglages sont dans un autre menu ?
settings.hint.tooltip.description=Ce plugin génère une image transparente avec l'identifiant de votre projet et l'applique via la fonctionnalité Image d'arrière-plan de l'IDE. Les options liées à l'image comme la position, l'opacité et l'échelle sont contrôlées par ce menu de l'IDE. Les autres options spécifiques au plugin sont disponibles ici.

# Paramètres au niveau de l'application (global)
settings.application.title=Identifiant de Projet (Global)
settings.application.ignored.words.label=Mots à ignorer (séparés par des virgules, insensible à la casse)
settings.application.ignored.words.tooltip=Mots à supprimer des noms de projet avant de générer les identifiants. La correspondance est insensible à la casse. Exemple : si vous ajoutez "tr, tre, internal", un projet nommé "tr-my-project" générera l'identifiant "MP" au lieu de "TMP".
settings.application.reset.label=Réinitialiser aux valeurs par défaut
settings.application.reset.button=Réinitialiser
settings.application.hint.label=Ces paramètres s'appliquent à tous les projets. Les paramètres spécifiques au projet sont disponibles dans la page "Identifiant de Projet".

# Métadonnées du plugin
plugin.name=Identifiant de projet
plugin.description=Ajoute un filigrane de texte discret et peu opaque à l'arrière-plan de l'éditeur pour distinguer plusieurs projets ouverts.
