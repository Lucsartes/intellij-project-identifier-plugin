settings.parent.title=Paramètres de l'identifiant de projet
settings.child.title=Paramètres du projet
settings.identifier.override.label=Remplacer le texte de l'identifiant (optionnel)
settings.identifier.override.tooltip.title=Utiliser des variables
settings.identifier.override.tooltip.description=Laissez ce champ vide pour dériver l'identifiant à partir du nom du projet, ou saisissez un texte personnalisé. Vous pouvez y insérer des variables résolues automatiquement. Prise en charge : ${branch} - la branche Git courante (par ex. "XXX - ${branch}"). Le filigrane est actualisé automatiquement lorsque vous changez de branche. Si le projet n'a pas de branche Git (pas un dépôt, ou HEAD détachée), ${branch} devient une chaîne vide.
settings.font.family.label=Famille de police
